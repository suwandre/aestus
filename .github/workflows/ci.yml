name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ts-checks:
    name: TypeScript checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bunx eslint .

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: |
          bun run test 2>&1 | tee /tmp/bun-test.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            no_tests=$(grep -c "No tests found" /tmp/bun-test.log || true)
            exited=$(grep -c "Exited with code 1" /tmp/bun-test.log || true)
            if [ "$no_tests" -gt 0 ] && [ "$no_tests" -eq "$exited" ]; then
              echo "All $no_tests package(s) have no test files yet — skipping."
              exit 0
            fi
            exit "$status"
          fi

  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace
