name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ts-checks:
    name: TypeScript checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bunx eslint .

      - name: Typecheck
        run: bun run typecheck

      - name: Build web
        run: bun run --filter '@aestus/web' build

      - name: Test
        run: |
          bun run test 2>&1 | tee /tmp/bun-test.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            no_tests=$(grep -c "No tests found" /tmp/bun-test.log || true)
            exited=$(grep -c "Exited with code 1" /tmp/bun-test.log || true)
            if [ "$no_tests" -gt 0 ] && [ "$no_tests" -eq "$exited" ]; then
              echo "All $no_tests package(s) have no test files yet — skipping."
              exit 0
            fi
            exit "$status"
          fi

  migration-smoke:
    name: Migration smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aestus
          POSTGRES_PASSWORD: aestus
          POSTGRES_DB: aestus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aestus -d aestus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      clickhouse:
        image: clickhouse/clickhouse-server:24.8-alpine
        env:
          CLICKHOUSE_USER: aestus
          CLICKHOUSE_PASSWORD: aestus
          CLICKHOUSE_DB: aestus
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        ports:
          - 8123:8123
    env:
      DATABASE_URL: postgres://aestus:aestus@localhost:5432/aestus
      CLICKHOUSE_URL: http://aestus:aestus@localhost:8123
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:8123/ping" >/dev/null; then
              echo "ClickHouse ready"; exit 0
            fi
            sleep 2
          done
          echo "ClickHouse did not become ready"; exit 1

      - name: Migration smoke test
        run: bun test test/migrate.smoke.test.ts
        working-directory: apps/api

  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace

      - name: Clippy
        # Lint severity is governed by [workspace.lints] in Cargo.toml: deny-level
        # lints (e.g. unused_imports) still fail here, while placeholder patterns
        # (unwrap_used/expect_used/dead_code) stay warnings during build-out per
        # the P01-T006 policy. A blanket `-D warnings` would override that intent.
        run: cargo clippy --workspace

      - name: Test
        run: cargo test --workspace
