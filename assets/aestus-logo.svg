<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 112" width="112" height="112" role="img" aria-label="Aestus">
  <defs>
    <linearGradient id="aestus-g" x1="16" y1="104" x2="88" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7a14d4"/>
      <stop offset="1" stop-color="#b431f5"/>
    </linearGradient>
  </defs>
  <!-- left blade of the chevron "A" -->
  <path d="M53.6 12.8 16 101.6l18-7.6 22.8-56.8z" fill="url(#aestus-g)"/>
  <!-- right blade with forked tail -->
